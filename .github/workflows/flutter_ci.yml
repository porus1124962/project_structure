name: Flutter CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1 – Lint, analyse, and test (Linux, fast)
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Analyse & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyse project source
        run: flutter analyze --fatal-infos

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          fail_ci_if_error: false   # don't fail CI if Codecov is unavailable

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2 – Build Android debug APK
  # ──────────────────────────────────────────────────────────────────────────
  build-android:
    name: Build Android (debug)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug --dart-define=ENVIRONMENT=dev

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # Job 3 – Build iOS debug (no code-sign)
  # ──────────────────────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS (debug)
    runs-on: macos-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no code-sign)
        run: flutter build ios --debug --no-codesign --dart-define=ENVIRONMENT=dev

